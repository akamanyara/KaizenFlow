{% extends "layout.html" %}

{% block title %}
    Register
{% endblock %}

{% block body %}
    <form action="/register" method="post">
        <div class="mb-3">
            <input name="email" class="form-control mx-auto w-auto" type="text"  placeholder="Email...">
        </div>
        <div class="mb-3">
            <input name="password" class="form-control mx-auto w-auto" type="password" placeholder="Password..."> 
        </div>
        <div class="mb-3">
            <input name="confirmation" class="form-control mx-auto w-auto" type="password" placeholder="Password...">
        </div>
        <div class="mb-3"> 
            <input name="nickname" class="form-control mx-auto w-auto" type="text" placeholder="Nickname...">
        </div>
        <button class="btn btn-primary d-block mx-auto" type="submit">Register</button>
    </form> 
{% endblock %}
